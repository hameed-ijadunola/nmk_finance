{% load humanize finance_extras %}

<!-- Summary Cards Partial -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Net Balance -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-slate-500">Net Balance</p>
                <p
                    class="text-2xl font-bold mt-1 {% if net_balance >= 0 %}text-emerald-600{% else %}text-red-600{% endif %}">
                    {{ net_balance|usd }}
                </p>
            </div>
            <div class="p-3 rounded-full {% if net_balance >= 0 %}bg-emerald-100{% else %}bg-red-100{% endif %}">
                <svg class="w-6 h-6 {% if net_balance >= 0 %}text-emerald-600{% else %}text-red-600{% endif %}"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Total Income -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-slate-500">Total Contributions</p>
                <p class="text-2xl font-bold text-emerald-600 mt-1">{{ total_income|usd }}</p>
            </div>
            <div class="p-3 bg-emerald-100 rounded-full">
                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 11l5-5m0 0l5 5m-5-5v12" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Total Expenses -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-slate-500">Total Expenses</p>
                <p class="text-2xl font-bold text-red-600 mt-1">{{ total_expenses|usd }}</p>
            </div>
            <div class="p-3 bg-red-100 rounded-full">
                <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 13l-5 5m0 0l-5-5m5 5V6" />
                </svg>
            </div>
        </div>
    </div>
</div>
