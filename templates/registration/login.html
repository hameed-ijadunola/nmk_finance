{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <div class="text-center mb-6">
            <svg class="w-12 h-12 mx-auto text-brand-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <h1 class="text-2xl font-bold text-slate-800">Member Login</h1>
            <p class="text-slate-500 text-sm mt-1">Sign in to view your contribution history</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-4 text-sm">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" name="username" id="id_username" autofocus required
                    class="w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-3 py-2.5 border">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-3 py-2.5 border">
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button type="submit"
                class="w-full bg-brand-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-brand-700 transition">
                Sign In
            </button>
        </form>

        <p class="text-center text-slate-400 text-xs mt-6">
            <a href="{% url 'finance:dashboard' %}" class="hover:text-brand-600 transition">
                ← Back to Dashboard
            </a>
        </p>
    </div>
</div>
{% endblock %}
